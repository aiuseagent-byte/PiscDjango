{% extends 'base.html' %}
{% load static %}

{% block 'body' %}
<div class="relative isolate min-h-screen bg-white overflow-hidden">
    <svg aria-hidden="true"
         class="absolute inset-0 -z-10 size-full mask-[radial-gradient(100%_100%_at_top_right,white,transparent)] stroke-gray-200">
        <defs>
            <pattern id="grid-pattern-auth" width="200" height="200" x="50%" y="-1" patternUnits="userSpaceOnUse">
                <path d="M.5 200V.5H200" fill="none" />
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid-pattern-auth)" stroke-width="0" />
    </svg>

    <div aria-hidden="true" class="absolute top-0 right-0 -z-10 transform-gpu blur-3xl opacity-20">
        <div style="clip-path: polygon(74% 44%, 100% 61%, 97% 26%, 85% 0%, 46% 2%, 0% 27%, 23% 51%, 58% 83%)"
             class="aspect-[1108/632] w-[40rem] bg-gradient-to-tr from-[#80caff] to-[#4f46e5]"></div>
    </div>

    <div class="flex min-h-screen">
        <div class="flex flex-1 flex-col justify-center px-4 py-12 sm:px-6 lg:flex-none lg:px-20 xl:px-24">
            <div class="mx-auto w-full max-w-sm lg:w-96">
                <div class="text-center lg:text-left">
                    <img src="{% static 'logo.png' %}" alt="Logo" class="h-16 w-auto mx-auto lg:mx-0" />
                    <h2 class="mt-8 text-3xl font-bold tracking-tight text-gray-900">Crie sua conta</h2>
                    <p class="mt-2 text-sm text-gray-600">
                        Já possui cadastro? 
                        <a href="{% url 'login' %}" class="font-medium text-cyan-600 hover:text-cyan-500">Faça login agora</a>
                    </p>
                </div>

                {% if messages %}
                <div class="mt-6 space-y-2">
                    {% for message in messages %}
                    <div class="rounded-lg p-4 text-sm font-medium {% if message.tags == 'error' %} bg-red-50 text-red-700 border border-red-100 {% else %} bg-green-50 text-green-700 border border-green-100 {% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <div class="mt-10">
                    <form action="{% url 'cadastro' %}" method="POST" class="space-y-5">
                        {% csrf_token %}
                        <div>
                            <label for="username" class="block text-sm font-semibold text-gray-700">Username</label>
                            <div class="mt-1.5 relative">
                                <input id="username" name="username" type="text" required
                                       class="block w-full rounded-lg border-gray-200 bg-gray-50/50 px-4 py-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-cyan-600 sm:text-sm transition-all"
                                       placeholder="ex: joaosilva">
                            </div>
                        </div>

                        <div>
                            <label for="password" class="block text-sm font-semibold text-gray-700">Senha</label>
                            <div class="mt-1.5">
                                <input id="password" name="password" type="password" required
                                       class="block w-full rounded-lg border-gray-200 bg-gray-50/50 px-4 py-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-cyan-600 sm:text-sm transition-all"
                                       placeholder="••••••••">
                            </div>
                        </div>

                        <div>
                            <button type="submit"
                                    class="flex w-full justify-center rounded-lg bg-cyan-600 px-4 py-3 text-sm font-bold text-white shadow-lg shadow-cyan-600/20 hover:bg-cyan-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-600 transition-all active:scale-[0.98]">
                                Criar Conta
                            </button>
                        </div>
                    </form>

                    <div class="mt-10">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center" aria-hidden="true">
                                <div class="w-full border-t border-gray-200"></div>
                            </div>
                            <div class="relative flex justify-center text-sm font-medium">
                                <span class="bg-white px-4 text-gray-500 uppercase tracking-widest text-[10px]">Ou continue com</span>
                            </div>
                        </div>

                        <div class="mt-6">
                            <a href="#" class="flex w-full items-center justify-center gap-3 rounded-xl bg-white px-4 py-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 transition-all font-semibold text-sm">
                                <svg class="h-5 w-5" aria-hidden="true" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                                </svg>
                                GitHub
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="relative hidden w-0 flex-1 lg:block">
            <img class="absolute inset-0 h-full w-full object-cover" 
                 src="{% static 'bg.png' %}" 
                 alt="Clinica Background">
                 <div class="absolute inset-0 bg-cyan-900/40 backdrop-blur-[2px]"></div>
        </div>
    </div>
</div>
{% endblock 'body' %}
